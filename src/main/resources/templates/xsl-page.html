<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>XSL Recipes</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div th:replace="navbar.html :: navbar"></div>

<div class="page-container">
    <div class="card">

        <h1>Select User for XSL View</h1>
        <p class="user-label-text">Choose a user to see recipes styled based on their cooking skill level</p>

        <form action="/xsl/recipes" method="get">
            <div class="form-group">
                <select name="userName">
                    <option th:each="user : ${users}"
                            th:value="${user.firstName + ' ' + user.lastName}"
                            th:text="${user.firstName + ' ' + user.lastName}">
                    </option>
                </select>
            </div>
            <button type="submit" class="btn-primary">Apply</button>

        </form>

        <div class="color-guide">
            <p class="color-guide-title">Color Coding in XSL View:</p>
            <p><span class="color-yellow-example">Yellow</span> = Recipes matching user's skill level</p>
            <p><span class="color-green-example">Green</span> = Other recipes</p>
        </div>

    </div>
</div>

</body>
</html>
