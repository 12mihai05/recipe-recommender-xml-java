<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Recipes</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div th:replace="navbar.html :: navbar"></div>
    <div class="page-container">
        <div class="card">
            <h1>All Recipes</h1>
            <p th:text="'Total: ' + ${#lists.size(recipes)} + ' recipes'"></p>

            <table class="table">
                <thead>
                    <tr>
                        <th>No</th>
                        <th>ID</th>
                        <th>Title</th>
                        <th>Cuisine 1</th>
                        <th>Cuisine 2</th>
                        <th>Difficulty</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="recipe, iter : ${recipes}">
                        <td th:text="${iter.index + 1}"></td>
                        <td th:text="${recipe.id}"></td>
                        <td th:text="${recipe.title}"></td>
                        <td th:text="${recipe.cuisineType1}"></td>
                        <td th:text="${recipe.cuisineType2}"></td>
                        <td th:text="${recipe.difficulty}"></td>
                        <td class="action-cell">
                            <a th:href="@{/recipe/{id}(id=${recipe.id})}" class="btn-view">View</a>
                            <form th:action="@{/recipes/delete/{id}(id=${recipe.id})}" method="post" style="display:inline;">
                                <button type="submit"
                                        onclick="return confirm('Are you sure you want to delete this recipe?')"
                                        class="btn-delete">
                                    Delete
                                </button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
