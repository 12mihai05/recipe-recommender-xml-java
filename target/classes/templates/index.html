<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Recommender XML Java</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="navbar.html :: navbar"></div>
<div class="page-container">
    <main class="card">
        <p class="badge">Project foundation</p>
        <h1>Recipe Recommender XML Java</h1>
        <p class="subtitle">Spring Boot, Thymeleaf, and XML structure are ready.</p>

        <section class="status-box">
            <h2>Dashboard Stats</h2>

            <p><strong>Total Recipes:</strong> <span th:text="${totalRecipes}"></span></p>
            <p><strong>Total Users:</strong> <span th:text="${totalUsers}"></span></p>
        </section>

    </main>
</div>
</body>
</html>
