<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recommendations</title>
</head>
<body>
    <h1>Recommendations</h1>

    <div th:if="${user != null}">
        <h2>User</h2>
        <p><strong>Name:</strong> <span th:text="${user.firstName} + ' ' + ${user.lastName}"></span></p>
        <p><strong>Skill Level:</strong> <span th:text="${user.skillLevel}"></span></p>
        <p><strong>Preferred Cuisine:</strong> <span th:text="${user.preferredCuisineType}"></span></p>

        <h2>Recommended Recipes</h2>
        <p th:text="'Found: ' + ${#lists.size(recipes)} + ' recipes'"></p>

        <table border="1" cellpadding="10" th:if="${recipes != null && recipes.size() > 0}">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Title</th>
                    <th>Cuisine 1</th>
                    <th>Cuisine 2</th>
                    <th>Difficulty</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="recipe : ${recipes}">
                    <td th:text="${recipe.id}"></td>
                    <td th:text="${recipe.title}"></td>
                    <td th:text="${recipe.cuisineType1}"></td>
                    <td th:text="${recipe.cuisineType2}"></td>
                    <td th:text="${recipe.difficulty}"></td>
                    <td><a th:href="@{/recipe/{id}(id=${recipe.id})}">View</a></td>
                </tr>
            </tbody>
        </table>

        <p th:if="${recipes == null || recipes.size() == 0}">No recommendations available.</p>
    </div>

    <div th:if="${user == null}">
        <h2>No User Found</h2>
        <p>Unable to load user data for recommendations.</p>
    </div>

    <br>
    <a href="/">Back to Home</a>
</body>
</html>
